name: zx_golf_app
description: "Golf practice performance tracking and scoring"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  flutter_riverpod: ^2.6.1
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  path: ^1.9.1
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  fl_chart: ^0.70.2
  connectivity_plus: ^6.0.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  test: ^1.25.0
  fake_async: ^1.3.1
  supabase: ^2.10.0

flutter:
  uses-material-design: true
